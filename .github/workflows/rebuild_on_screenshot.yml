name: "🔄 Rebuild site on screenshot upload"

on:
  push:
    branches: [main]
    paths:
      - 'data/predictions/*/iphone_screenshot.png'

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build site
        run: python scripts/build_site.py

      - name: Commit and push
        run: |
          git config user.name "DavesSweaterBot"
          git config user.email "bot@davessweater.com"
          git add docs/
          git commit -m "🔄 Rebuild site with new screenshot" || echo "No changes to commit"
          git pull origin main --no-rebase -X ours || true
          git push origin main || (sleep 5 && git pull origin main --no-rebase -X ours && git push origin main)
