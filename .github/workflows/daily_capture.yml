name: "📸 Daily Capture"

on:
  schedule:
    - cron: '0 11 * * *'  # 7:00 AM EDT / 6:00 AM EST
  workflow_dispatch:        # manual trigger for testing

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Fetch Substack RSS feed
        run: python scripts/fetch_substack.py
        continue-on-error: true

      - name: Capture Ray's Weather forecast
        run: python scripts/capture_rays.py
        continue-on-error: true

      - name: Capture Open-Meteo forecast
        run: python scripts/capture_openmeteo.py --forecast

      - name: Capture iPhone Weather (Open-Meteo fallback)
        run: python scripts/capture_iphone_weather.py
        continue-on-error: true

      - name: Commit captures
        run: |
          git config user.name "DavesSweaterBot"
          git config user.email "bot@davessweater.com"
          git add data/predictions/ data/substack_feed.json
          git commit -m "📸 Daily capture $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push
