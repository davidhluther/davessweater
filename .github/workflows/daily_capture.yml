name: "📸 Daily Capture"

on:
  schedule:
    - cron: '0 14 * * *'  # 10:00 AM EDT / 9:00 AM EST
  workflow_dispatch:        # manual trigger for testing

permissions:
  contents: write

# Shares the data-writing concurrency group so it never runs at the same time as
# the compare / upload workflows (all of them push data/ to main).
concurrency:
  group: davessweater-data
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Ensure latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Fetch Substack RSS feed
        run: python scripts/fetch_substack.py
        continue-on-error: true

      - name: Capture Ray's Weather forecast
        run: python scripts/capture_rays.py
        continue-on-error: true

      - name: Capture Open-Meteo forecast
        run: python scripts/capture_openmeteo.py --forecast

      - name: Capture iPhone Weather (Open-Meteo fallback)
        run: python scripts/capture_iphone_weather.py
        continue-on-error: true

      - name: Capture fireworks forecast (seasonal; self-gating outside late June-July 5)
        run: python scripts/capture_fireworks_forecast.py
        continue-on-error: true

      - name: Capture free forecasters (NWS, Met.no, OWM, WeatherAPI, Visual Crossing, Tomorrow.io, Google)
        run: python scripts/capture_sources.py
        continue-on-error: true
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          WEATHERAPI_KEY: ${{ secrets.WEATHERAPI_KEY }}
          VISUALCROSSING_KEY: ${{ secrets.VISUALCROSSING_KEY }}
          TOMORROW_API_KEY: ${{ secrets.TOMORROW_API_KEY }}
          GOOGLE_WEATHER_API_KEY: ${{ secrets.GOOGLE_WEATHER_API_KEY }}

      - name: Commit captures
        run: |
          git config user.name "DavesSweaterBot"
          git config user.email "bot@davessweater.com"
          git add data/predictions/ data/substack_feed.json data/fireworks_forecast.json
          git commit -m "Daily capture $(date +%Y-%m-%d)" || echo "No changes to commit"
          git pull origin main --no-rebase -X ours || true
          git push origin main || (sleep 5 && git pull origin main --no-rebase -X ours && git push origin main)
