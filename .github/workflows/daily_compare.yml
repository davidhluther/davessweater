name: "📊 Daily Compare & Build"

on:
  schedule:
    - cron: '30 10 * * *'  # 6:30 AM EDT / 5:30 AM EST — follows the earlier capture; yesterday's actuals are long since posted
  workflow_run:
    workflows: ["📱 iPhone Screenshot Upload", "📸 Daily Capture"]
    types: [completed]
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to compare (YYYY-MM-DD, default: yesterday)'
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

# Serialize every workflow that commits data/ to main so two runs can't race on
# scores.json (the -X ours push strategy would otherwise let a stale run win).
concurrency:
  group: davessweater-data
  cancel-in-progress: false

jobs:
  compare-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Ensure latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Substack posts
        run: python scripts/fetch_substack.py
        continue-on-error: true

      # The workflow_dispatch date input is passed via env (never interpolated
      # directly into a run: command) so it can't be used for shell injection.
      - name: Fetch yesterday's actuals
        env:
          INPUT_DATE: ${{ github.event.inputs.date }}
        run: |
          if [ -n "$INPUT_DATE" ]; then
            python scripts/capture_openmeteo.py --actuals --date "$INPUT_DATE"
          else
            python scripts/capture_openmeteo.py --actuals
          fi

      - name: Run comparison
        env:
          INPUT_DATE: ${{ github.event.inputs.date }}
        run: |
          if [ -n "$INPUT_DATE" ]; then
            python scripts/compare.py --date "$INPUT_DATE"
          else
            python scripts/compare.py
          fi

      # Recover any older day the archive lag left captured-but-unscored (best-
      # effort, retried daily). Runs after the main compare so a recovered
      # comparison is committed with the day's data.
      - name: Backfill sweep
        run: python scripts/backfill_missing.py
        continue-on-error: true

      # Fail the run (before committing) if a mandatory source silently dropped a
      # field — the Ray's-deflation failure mode — so it surfaces as a red run and
      # a notification instead of a quietly-published bad day.
      - name: Check capture health
        env:
          INPUT_DATE: ${{ github.event.inputs.date }}
        run: |
          if [ -n "$INPUT_DATE" ]; then
            python scripts/check_capture_health.py --date "$INPUT_DATE"
          else
            python scripts/check_capture_health.py
          fi

      # Lead-time scoring: grade the just-compared date at leads 0-5 and
      # rebuild data/leadtime_scores.json (the accuracy-decay chart's input).
      # Pure local computation over data already validated above; the commit
      # step's `git add data/` picks up data/leadtime/ and leadtime_scores.
      # The date input rides in via env (never interpolated into run:), same
      # as the compare steps above.
      - name: Update lead-time scores
        env:
          INPUT_DATE: ${{ github.event.inputs.date }}
        run: |
          if [ -n "$INPUT_DATE" ]; then
            python scripts/leadtime.py "$INPUT_DATE"
          else
            python scripts/leadtime.py
          fi

      - name: Export scores CSV
        run: python scripts/export_scores_csv.py

      # Site is built by Vercel (next build) on push; the bot only commits data/.
      - name: Commit results
        run: |
          git config user.name "DavesSweaterBot"
          git config user.email "bot@davessweater.com"
          git add data/
          git commit -m "📊 Daily comparison $(date +%Y-%m-%d)" || echo "No changes to commit"
          git pull origin main --no-rebase -X ours || true
          git push origin main || (sleep 5 && git pull origin main --no-rebase -X ours && git push origin main)
