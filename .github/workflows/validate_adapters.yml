name: "Validate adapters (throwaway)"
on:
  push:
    branches: [source-expansion]
    paths: [".github/workflows/validate_adapters.yml"]
  workflow_dispatch:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Capture all sources and show first daily entry
        continue-on-error: true
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          WEATHERAPI_KEY: ${{ secrets.WEATHERAPI_KEY }}
          VISUALCROSSING_KEY: ${{ secrets.VISUALCROSSING_KEY }}
          TOMORROW_API_KEY: ${{ secrets.TOMORROW_API_KEY }}
          GOOGLE_WEATHER_API_KEY: ${{ secrets.GOOGLE_WEATHER_API_KEY }}
        run: |
          python scripts/capture_sources.py
          python - <<'PY'
          import json, glob, os
          from datetime import datetime
          from zoneinfo import ZoneInfo
          today = datetime.now(ZoneInfo("America/New_York")).strftime("%Y-%m-%d")
          print("=== first daily entry per source ===")
          for f in sorted(glob.glob(f"data/predictions/{today}/*_forecast.json")):
              key = os.path.basename(f).replace("_forecast.json","")
              d0 = (json.load(open(f)).get("daily") or [{}])[0]
              print(f"{key:15s} {json.dumps(d0)}")
          PY
