name: "📱 iPhone Screenshot Upload"

# Triggered by iOS Shortcut via GitHub API:
#   POST https://api.github.com/repos/davidhluther/davessweater/dispatches
#   Body: {
#     "event_type": "iphone-screenshot",
#     "client_payload": {
#       "screenshot": "<base64-encoded PNG>",
#       "date": "2026-03-05",
#       "today_high_f": 58,
#       "tonight_low_f": 35,
#       "wind_mph": 12,
#       "rainfall_in": 0.0,
#       "conditions": "Partly Cloudy"
#     }
#   }

on:
  repository_dispatch:
    types: [iphone-screenshot]

permissions:
  contents: write

jobs:
  save-screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Decode and save screenshot + forecast
        env:
          SCREENSHOT_B64: ${{ github.event.client_payload.screenshot }}
          CAPTURE_DATE: ${{ github.event.client_payload.date }}
          TODAY_HIGH_F: ${{ github.event.client_payload.today_high_f }}
          TONIGHT_LOW_F: ${{ github.event.client_payload.tonight_low_f }}
          WIND_MPH: ${{ github.event.client_payload.wind_mph }}
          RAINFALL_IN: ${{ github.event.client_payload.rainfall_in }}
          CONDITIONS: ${{ github.event.client_payload.conditions }}
        run: |
          # Use provided date or default to today (EST)
          DATE="${CAPTURE_DATE:-$(TZ=America/New_York date +%Y-%m-%d)}"
          DIR="data/predictions/${DATE}"
          mkdir -p "$DIR"

          # Decode base64 screenshot
          echo "$SCREENSHOT_B64" | base64 -d > "${DIR}/iphone_screenshot.png"

          # Validate it's actually a PNG
          if ! file "${DIR}/iphone_screenshot.png" | grep -q PNG; then
            echo "ERROR: Decoded file is not a valid PNG"
            exit 1
          fi

          # Save Apple Weather forecast numbers if provided
          if [ -n "$TODAY_HIGH_F" ] || [ -n "$TONIGHT_LOW_F" ]; then
            python3 -c "
          import json, re, os

          def parse_num(s):
              if not s:
                  return None
              # Strip units like °F, mph, in — keep only digits, dots, minus
              cleaned = re.sub(r'[^0-9.\-]', '', s)
              try:
                  return float(cleaned)
              except (ValueError, TypeError):
                  return None

          data = {
              'date': '$DATE',
              'source': 'Apple Weather (iPhone Shortcut)',
              'today_high_f': parse_num('${TODAY_HIGH_F}'),
              'tonight_low_f': parse_num('${TONIGHT_LOW_F}'),
              'wind_mph': parse_num('${WIND_MPH}'),
              'rainfall_in': parse_num('${RAINFALL_IN}'),
              'conditions': '${CONDITIONS}' or None,
          }
          # Drop None values
          data = {k: v for k, v in data.items() if v is not None}
          with open('$DIR/iphone_forecast_apple.json', 'w') as f:
              json.dump(data, f, indent=2)
          print(f'Saved Apple Weather forecast: {json.dumps(data)}')
          "
          else
            echo "No forecast numbers provided, skipping iphone_forecast_apple.json"
          fi

          echo "date=${DATE}" >> "$GITHUB_ENV"
          echo "Saved screenshot to ${DIR}/iphone_screenshot.png"

      - name: Rebuild site
        run: python scripts/build_site.py

      - name: Commit and push
        run: |
          git config user.name "DavesSweaterBot"
          git config user.email "bot@davessweater.com"
          git add data/predictions/ docs/
          git commit -m "📱 iPhone screenshot ${date}" || echo "No changes to commit"
          git pull origin main --no-rebase -X ours || true
          git push origin main || (sleep 5 && git pull origin main --no-rebase -X ours && git push origin main)
