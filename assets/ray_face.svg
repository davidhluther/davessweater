<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Circle border matching Ray's Weather teal -->
  <circle cx="50" cy="50" r="48" fill="#3C5468" stroke="#5a7d95" stroke-width="3"/>
  <!-- Face base -->
  <ellipse cx="50" cy="54" rx="28" ry="32" fill="#f0d0b0"/>
  <!-- Hair (gray) -->
  <ellipse cx="50" cy="30" rx="30" ry="18" fill="#c0c0c0"/>
  <ellipse cx="25" cy="42" rx="8" ry="14" fill="#c0c0c0"/>
  <ellipse cx="75" cy="42" rx="8" ry="14" fill="#c0c0c0"/>
  <!-- Glasses -->
  <rect x="32" y="44" width="14" height="10" rx="3" fill="none" stroke="#555" stroke-width="1.5"/>
  <rect x="54" y="44" width="14" height="10" rx="3" fill="none" stroke="#555" stroke-width="1.5"/>
  <line x1="46" y1="49" x2="54" y2="49" stroke="#555" stroke-width="1.5"/>
  <!-- Eyes -->
  <circle cx="39" cy="49" r="2" fill="#444"/>
  <circle cx="61" cy="49" r="2" fill="#444"/>
  <!-- Smile -->
  <path d="M 38 62 Q 50 72 62 62" fill="none" stroke="#a0522d" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Collar hint -->
  <path d="M 30 82 Q 50 75 70 82" fill="#fff" stroke="none"/>
